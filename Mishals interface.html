<!DOCTYPE html>
<html>
<head>
    <title>Mishals Brilliant Emote</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 650px;
            margin: 20px auto;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #aaccff;
            min-height: 100vh;
        }

        .container {
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2f 100%);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 100, 255, 0.3);
            border: 2px solid #2a4a7a;
        }

        h1 {
            text-align: center;
            color: #7aaaff;
            text-shadow: 0 0 15px #2a6eff;
            font-size: 2.3em;
            margin-bottom: 10px;
        }

        .timer-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #timer {
            font-size: 4.5em;
            text-align: center;
            margin: 25px 0;
            font-family: 'Courier New', monospace;
            background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3a 100%);
            padding: 30px 20px;
            border-radius: 40px;
            border: 3px solid #2a6eff;
            color: #99ccff;
            text-shadow: 0 0 20px #2a6eff, 0 0 40px #0044ff;
            box-shadow: inset 0 0 20px rgba(0, 100, 255, 0.4);
            letter-spacing: 5px;
            flex: 1;
        }

        .manual-time-btn {
            background: linear-gradient(145deg, #4a8aff 0%, #2a6eff 100%);
            color: white;
            border: 2px solid #aaccff;
            border-radius: 30px;
            width: 50px;
            height: 50px;
            font-size: 1.8em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0, 100, 255, 0.5);
            transition: all 0.3s ease;
        }

        .manual-time-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 150, 255, 0.8);
        }

        .manual-input-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f2a 100%);
            padding: 30px;
            border-radius: 40px;
            border: 3px solid #2a6eff;
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.7);
            z-index: 1000;
            width: 90%;
            max-width: 350px;
        }

        .manual-input-popup.active {
            display: block;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
        }

        .popup-overlay.active {
            display: block;
        }

        .manual-input-popup h3 {
            color: #7aaaff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .time-input-field {
            text-align: center;
        }

        .time-input-field label {
            display: block;
            color: #7aaaff;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .time-input-field input {
            width: 70px;
            padding: 10px;
            background: #0a0a1a;
            border: 2px solid #2a4a7a;
            border-radius: 15px;
            color: #aaccff;
            font-size: 1.2em;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .time-input-field input:focus {
            outline: none;
            border-color: #2a6eff;
            box-shadow: 0 0 15px #2a6eff;
        }

        .popup-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .popup-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .popup-btn.confirm {
            background: linear-gradient(145deg, #2a6eff 0%, #0044cc 100%);
            color: white;
        }

        .popup-btn.cancel {
            background: linear-gradient(145deg, #ff4d4d 0%, #cc0000 100%);
            color: white;
        }

        .popup-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .subjects-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            min-height: 80px;
        }

        .subject-wrapper {
            position: relative;
            display: inline-block;
        }

        .subject-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 100, 255, 0.5);
            transition: all 0.3s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            min-width: 100px;
        }

        .subject-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 150, 255, 0.8);
        }

        .subject-btn.selected {
            border: 3px solid #aaccff;
            box-shadow: 0 0 30px #2a6eff;
            transform: scale(1.05);
        }

        .delete-subject {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff4d4d 0%, #cc0000 100%);
            color: white;
            border: 2px solid #7aaaff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 2px 10px rgba(255, 0, 0, 0.6);
            font-weight: bold;
            z-index: 10;
        }

        .subject-wrapper:hover .delete-subject {
            opacity: 1;
        }

        .delete-subject:hover {
            background: linear-gradient(145deg, #ff6666 0%, #ff3333 100%);
            transform: scale(1.1);
        }

        .add-subject-form {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f2a 100%);
            padding: 25px;
            border-radius: 60px;
            margin: 25px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            border: 2px solid #2a6eff;
            box-shadow: 0 5px 25px rgba(0, 100, 255, 0.4);
        }

        .add-subject-form input {
            padding: 15px 25px;
            border: 2px solid #2a4a7a;
            border-radius: 50px;
            flex: 1;
            min-width: 200px;
            background: #0a0a1a;
            color: #aaccff;
            font-size: 1.1em;
        }

        .add-subject-form input::placeholder {
            color: #5a7a9a;
            opacity: 0.8;
        }

        .add-subject-form input:focus {
            outline: none;
            border-color: #2a6eff;
            box-shadow: 0 0 15px #2a6eff;
        }

        .add-subject-form input[type=color] {
            flex: 0 0 70px;
            height: 55px;
            padding: 5px;
            border-radius: 35px;
            cursor: pointer;
        }

        .add-subject-form button {
            padding: 15px 30px;
            background: linear-gradient(145deg, #2a6eff 0%, #0044cc 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            box-shadow: 0 5px 20px rgba(0, 100, 255, 0.5);
            transition: all 0.3s ease;
        }

        .add-subject-form button:hover {
            background: linear-gradient(145deg, #4a8aff 0%, #2a6eff 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 150, 255, 0.7);
        }

        .controls {
            text-align: center;
            margin: 25px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .control-btn {
            padding: 18px 35px;
            margin: 5px;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            flex: 1 1 auto;
            min-width: 120px;
        }

        #startBtn {
            background: linear-gradient(145deg, #2a6eff 0%, #0044aa 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(42, 110, 255, 0.6);
        }
        #pauseBtn {
            background: linear-gradient(145deg, #6a4aff 0%, #3a2aff 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(106, 74, 255, 0.6);
        }
        #resetBtn {
            background: linear-gradient(145deg, #ff4d4d 0%, #cc0000 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 77, 77, 0.6);
        }
        #saveBtn {
            background: linear-gradient(145deg, #00aaff 0%, #0088cc 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 170, 255, 0.6);
        }

        .control-btn:hover {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 12px 30px rgba(0, 100, 255, 0.8);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .stats {
            background: linear-gradient(145deg, #0f0f1f 0%, #1a1a3a 100%);
            padding: 20px;
            border-radius: 30px;
            margin: 25px 0;
            border: 2px solid #2a6eff;
            box-shadow: 0 5px 25px rgba(0, 100, 255, 0.4);
            text-align: center;
        }

        .stats h3 {
            color: #7aaaff;
            margin: 0;
            font-size: 1.5em;
        }

        .stats span {
            color: #aaccff;
            font-weight: bold;
            font-size: 1.6em;
            text-shadow: 0 0 15px #2a6eff;
            display: inline-block;
            margin-left: 10px;
        }

        h2 {
            color: #7aaaff;
            border-bottom: 3px solid #2a4a7a;
            padding-bottom: 15px;
            text-align: center;
            font-size: 2em;
            text-shadow: 0 0 10px #2a6eff;
            margin: 30px 0 20px 0;
        }

        #sessionList {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .session-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin: 10px 0;
            background: linear-gradient(145deg, #0a0a1a 0%, #1a1a2f 100%);
            border-radius: 20px;
            border: 2px solid #2a4a7a;
            color: #aaccff;
            transition: all 0.3s ease;
        }

        .session-item:hover {
            transform: translateX(5px);
            border-color: #2a6eff;
            box-shadow: 0 5px 20px rgba(0, 100, 255, 0.5);
        }

        .session-item small {
            color: #7aaaff;
            font-size: 0.9em;
        }

        .session-item strong {
            color: #aaccff;
            font-size: 1.2em;
        }

        .delete-btn {
            background: linear-gradient(145deg, #ff4d4d 0%, #cc0000 100%);
            color: white;
            border: 2px solid #7aaaff;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 15px rgba(255, 0, 0, 0.5);
            font-size: 1em;
        }

        .delete-btn:hover {
            background: linear-gradient(145deg, #ff6666 0%, #ff3333 100%);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.7);
        }

        .chart-container {
            margin-top: 40px;
            padding: 25px;
            background: linear-gradient(145deg, #0f0f1f 0%, #1a1a3a 100%);
            border-radius: 40px;
            border: 2px solid #2a6eff;
            box-shadow: 0 10px 35px rgba(0, 100, 255, 0.4);
        }

        .chart-title {
            text-align: center;
            color: #7aaaff;
            margin-bottom: 20px;
            font-size: 1.8em;
            text-shadow: 0 0 15px #2a6eff;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 280px;
            filter: drop-shadow(0 0 20px #2a6eff);
            margin: 20px 0;
        }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 100, 255, 0.15);
            border-radius: 50px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1em;
            color: #aaccff;
            background: rgba(42, 110, 255, 0.2);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #2a6eff;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .time-range {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 25px 0;
            flex-wrap: wrap;
        }

        .range-btn {
            background: linear-gradient(145deg, #1a1a2e 0%, #0a0a1a 100%);
            color: #7aaaff;
            border: 2px solid #2a4a7a;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 3px 15px rgba(0, 100, 255, 0.4);
        }

        .range-btn.active {
            background: linear-gradient(145deg, #2a6eff 0%, #0044cc 100%);
            color: white;
            border-color: #aaccff;
            box-shadow: 0 0 30px #2a6eff;
            transform: scale(1.02);
        }

        .range-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 150, 255, 0.7);
        }

        .empty-message {
            color: #5a7a9a;
            text-align: center;
            font-style: italic;
            padding: 30px;
            font-size: 1.2em;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #0a0a1a; border-radius: 20px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(145deg, #2a6eff 0%, #0044cc 100%);
            border-radius: 20px;
            border: 2px solid #7aaaff;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(145deg, #4a8aff 0%, #2a6eff 100%);
        }

        @media (max-width: 500px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            #timer { font-size: 3.2em; }
            .control-btn { padding: 15px 25px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>&nbsp;Mishals Brilliant Emote </h1>

        <div class="timer-container">
            <div id="timer">00:00:00</div>
            <button class="manual-time-btn" onclick="openManualTimePopup()" title="Set time manually">✏️</button>
        </div>

        <div class="popup-overlay" id="popupOverlay" onclick="closeManualTimePopup()"></div>
        <div class="manual-input-popup" id="manualTimePopup">
            <h3>Set Study Time</h3>
            <div class="time-input-group">
                <div class="time-input-field">
                    <label>Hours</label>
                    <input type="number" id="manualHours" min="0" max="23" value="0">
                </div>
                <div class="time-input-field">
                    <label>Minutes</label>
                    <input type="number" id="manualMinutes" min="0" max="59" value="0">
                </div>
                <div class="time-input-field">
                    <label>Seconds</label>
                    <input type="number" id="manualSeconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="popup-buttons">
                <button class="popup-btn confirm" onclick="setManualTime()">Set Time</button>
                <button class="popup-btn cancel" onclick="closeManualTimePopup()">Cancel</button>
            </div>
        </div>

        <div class="subjects-container" id="subjectsContainer"></div>

        <div class="add-subject-form">
            <input type="text" id="newSubjectName" placeholder="Subject name (e.g. Physics)">
            <input type="color" id="newSubjectColor" value="#2a6eff">
            <button onclick="addNewSubject()">➕ Add Subject</button>
        </div>

        <div class="controls">
            <button class="control-btn" id="startBtn">▶ Start</button>
            <button class="control-btn" id="pauseBtn">️ Pause</button>
            <button class="control-btn" id="resetBtn">&nbsp;Reset</button>
            <button class="control-btn" id="saveBtn">&nbsp;Save</button>
        </div>

        <div class="stats">
            <h3>Today's Study Time: <span id="todayTotal">0</span> minutes</h3>
        </div>

        <h2>&nbsp;Past Sessions</h2>
        <div id="sessionList"></div>

        <div class="chart-container">
            <h3 class="chart-title">&nbsp;Study Distribution</h3>
            <div class="time-range">
                <button class="range-btn active" onclick="updateChart('day')" id="dayBtn">Today</button>
                <button class="range-btn" onclick="updateChart('week')" id="weekBtn">This Week</button>
                <button class="range-btn" onclick="updateChart('month')" id="monthBtn">This Month</button>
                <button class="range-btn" onclick="updateChart('all')" id="allBtn">All Time</button>
            </div>
            <div class="chart-wrapper">
                <canvas id="studyChart"></canvas>
            </div>
            <div id="chartLegend" class="chart-legend"></div>
        </div>
    </div>

    <script>
        // ========== DATA STORAGE ==========
        let subjects = [
            { name: 'Physics', color: '#2a6eff' },
            { name: 'Math', color: '#4a8aff' },
            { name: 'Chemistry', color: '#0044cc' },
            { name: 'Programming', color: '#00aaff' },
            { name: 'Engineering', color: '#6a4aff' }
        ];

        let savedSubjects = localStorage.getItem('blue_subjects');
        if (savedSubjects) subjects = JSON.parse(savedSubjects);

        let sessions = [];
        let savedSessions = localStorage.getItem('blue_sessions');
        if (savedSessions) sessions = JSON.parse(savedSessions);

        // ========== TIMER VARIABLES ==========
        let seconds = 0;
        let accumulatedSeconds = 0;
        let isRunning = false;
        let timerStartTime = null;
        let timerUpdateTimeout = null;
        let currentSubject = subjects.length > 0 ? subjects[0].name : '';
        let currentColor = subjects.length > 0 ? subjects[0].color : '#2a6eff';

        // ========== CHART VARIABLES ==========
        let myChart = null;
        let currentTimeRange = 'day';

        // ========== SAVE TO LOCALSTORAGE ==========
        function saveSubjects() {
            localStorage.setItem('blue_subjects', JSON.stringify(subjects));
        }

        function saveSessions() {
            localStorage.setItem('blue_sessions', JSON.stringify(sessions));
        }

        // ========== TIMER FUNCTIONS ==========
        function formatTime(totalSeconds) {
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let secs = totalSeconds % 60;
            return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function updateTimerDisplay() {
            document.getElementById('timer').textContent = formatTime(seconds);
        }

        // ========== MANUAL TIME ENTRY ==========
        window.openManualTimePopup = function() {
            if (isRunning) pauseTimer();
            let hours = Math.floor(seconds / 3600);
            let minutes = Math.floor((seconds % 3600) / 60);
            let secs = seconds % 60;
            document.getElementById('manualHours').value = hours;
            document.getElementById('manualMinutes').value = minutes;
            document.getElementById('manualSeconds').value = secs;
            document.getElementById('popupOverlay').classList.add('active');
            document.getElementById('manualTimePopup').classList.add('active');
        };

        window.closeManualTimePopup = function() {
            document.getElementById('popupOverlay').classList.remove('active');
            document.getElementById('manualTimePopup').classList.remove('active');
        };

        window.setManualTime = function() {
            let hours = parseInt(document.getElementById('manualHours').value) || 0;
            let minutes = parseInt(document.getElementById('manualMinutes').value) || 0;
            let secs = parseInt(document.getElementById('manualSeconds').value) || 0;
            if (hours < 0) hours = 0;
            if (minutes < 0) minutes = 0;
            if (secs < 0) secs = 0;
            if (minutes > 59) minutes = 59;
            if (secs > 59) secs = 59;
            seconds = (hours * 3600) + (minutes * 60) + secs;
            accumulatedSeconds = seconds;
            updateTimerDisplay();
            closeManualTimePopup();
        };

        // ========== TIMER CONTROL ==========
        function pauseTimer() {
            isRunning = false;
            accumulatedSeconds = seconds;
            timerStartTime = null;
            if (timerUpdateTimeout) {
                clearTimeout(timerUpdateTimeout);
                timerUpdateTimeout = null;
            }
        }

        function startTimer() {
            if (subjects.length === 0) {
                alert('Please add a subject first!');
                return;
            }
            if (!isRunning) {
                isRunning = true;
                timerStartTime = Date.now() - (accumulatedSeconds * 1000);
                function updateTimer() {
                    if (!isRunning) return;
                    let now = Date.now();
                    seconds = Math.floor((now - timerStartTime) / 1000);
                    updateTimerDisplay();
                    timerUpdateTimeout = setTimeout(updateTimer, 1000 - (now % 1000));
                }
                timerUpdateTimeout = setTimeout(updateTimer, 1000 - (Date.now() % 1000));
            }
        }

        function resetTimer() {
            if (isRunning) pauseTimer();
            seconds = 0;
            accumulatedSeconds = 0;
            timerStartTime = null;
            updateTimerDisplay();
        }

        document.getElementById('startBtn').addEventListener('click', startTimer);
        document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
        document.getElementById('resetBtn').addEventListener('click', resetTimer);

        // ========== DISPLAY SUBJECTS ==========
        function displaySubjects() {
            let container = document.getElementById('subjectsContainer');
            container.innerHTML = '';

            if (subjects.length === 0) {
                container.innerHTML = '<div class="empty-message">✨ Add a subject to start studying!</div>';
                return;
            }

            subjects.forEach(function(subject, index) {
                let wrapper = document.createElement('div');
                wrapper.className = 'subject-wrapper';

                let button = document.createElement('button');
                button.className = 'subject-btn';
                button.textContent = subject.name;
                button.style.background = `linear-gradient(145deg, ${subject.color}, ${subject.color}dd)`;
                button.onclick = function() {
                    selectSubject(subject.name, subject.color, button);
                };

                let deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-subject';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = function(event) {
                    event.stopPropagation();
                    deleteSubject(index);
                };

                wrapper.appendChild(button);
                wrapper.appendChild(deleteBtn);
                container.appendChild(wrapper);
            });

            // Auto-select current subject or default to first
            let allBtns = document.querySelectorAll('.subject-btn');
            let matched = false;
            allBtns.forEach(function(btn) {
                if (btn.textContent === currentSubject) {
                    btn.classList.add('selected');
                    matched = true;
                }
            });
            if (!matched && allBtns.length > 0) {
                allBtns[0].classList.add('selected');
                currentSubject = subjects[0].name;
                currentColor = subjects[0].color;
            }
        }

        // ========== SELECT SUBJECT ==========
        function selectSubject(name, color, btnEl) {
            currentSubject = name;
            currentColor = color;
            document.querySelectorAll('.subject-btn').forEach(btn => btn.classList.remove('selected'));
            if (btnEl) btnEl.classList.add('selected');
        }

        // ========== DELETE SUBJECT ==========
        function deleteSubject(index) {
            if (confirm(`Delete "${subjects[index].name}"?`)) {
                subjects.splice(index, 1);
                saveSubjects();
                if (subjects.length > 0) {
                    currentSubject = subjects[0].name;
                    currentColor = subjects[0].color;
                } else {
                    currentSubject = '';
                    currentColor = '#2a6eff';
                }
                displaySubjects();
                updateChart(currentTimeRange);
            }
        }

        // ========== ADD NEW SUBJECT ==========
        window.addNewSubject = function() {
            let nameInput = document.getElementById('newSubjectName');
            let colorInput = document.getElementById('newSubjectColor');
            let newName = nameInput.value.trim();

            if (newName === '') {
                alert('Please enter a subject name!');
                return;
            }
            if (subjects.some(s => s.name.toLowerCase() === newName.toLowerCase())) {
                alert('Subject already exists!');
                return;
            }

            subjects.push({ name: newName, color: colorInput.value });
            currentSubject = newName;
            currentColor = colorInput.value;
            saveSubjects();
            nameInput.value = '';
            displaySubjects();
        };

        // ========== SAVE SESSION ==========
        document.getElementById('saveBtn').addEventListener('click', function() {
            if (subjects.length === 0) {
                alert('Please add a subject first!');
                return;
            }
            if (seconds === 0) {
                alert('Please study first!');
                return;
            }

            sessions.push({
                subject: currentSubject,
                color: currentColor,
                duration: seconds,
                date: new Date().toISOString()
            });
            saveSessions();
            resetTimer();
            alert('Session saved! 💙');
            displaySessions();
            updateTodayTotal();
            updateChart(currentTimeRange);
        });

        // ========== DISPLAY SESSIONS ==========
        function displaySessions() {
            let sessionList = document.getElementById('sessionList');
            sessionList.innerHTML = '';

            if (sessions.length === 0) {
                sessionList.innerHTML = '<div class="empty-message"> No study sessions yet. Start studying!</div>';
                return;
            }

            let reversed = [...sessions].reverse();

            reversed.forEach(function(session, displayIndex) {
                let sessionDate = new Date(session.date);
                let originalIndex = sessions.length - 1 - displayIndex;

                let sessionDiv = document.createElement('div');
                sessionDiv.className = 'session-item';
                sessionDiv.style.borderLeft = `8px solid ${session.color}`;

                let dateStr = sessionDate.toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', year: 'numeric'
                });
                let timeStr = sessionDate.toLocaleTimeString('en-US', {
                    hour: '2-digit', minute: '2-digit'
                });

                sessionDiv.innerHTML = `
                    <div>
                        <strong>${session.subject}</strong> — ${formatTime(session.duration)}<br>
                        <small>${dateStr} at ${timeStr}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteSession(${originalIndex})">🗑️ Delete</button>
                `;

                sessionList.appendChild(sessionDiv);
            });
        }

        // ========== DELETE SESSION ==========
        window.deleteSession = function(index) {
            if (confirm('Delete this session?')) {
                sessions.splice(index, 1);
                saveSessions();
                displaySessions();
                updateTodayTotal();
                updateChart(currentTimeRange);
            }
        };

        // ========== TODAY'S TOTAL ==========
        function updateTodayTotal() {
            let today = new Date().toDateString();
            let totalSeconds = sessions
                .filter(s => new Date(s.date).toDateString() === today)
                .reduce((sum, s) => sum + s.duration, 0);
            document.getElementById('todayTotal').textContent = Math.round(totalSeconds / 60);
        }

        // ========== CHART ==========
        window.updateChart = function(range) {
            currentTimeRange = range;

            document.querySelectorAll('.range-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(
                range === 'day' ? 'dayBtn' :
                range === 'week' ? 'weekBtn' :
                range === 'month' ? 'monthBtn' : 'allBtn'
            ).classList.add('active');

            let now = new Date();
            let filtered = sessions.filter(function(session) {
                let d = new Date(session.date);
                if (range === 'day') return d.toDateString() === now.toDateString();
                if (range === 'week') {
                    let weekAgo = new Date(now);
                    weekAgo.setDate(now.getDate() - 7);
                    return d >= weekAgo;
                }
                if (range === 'month') {
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }
                return true;
            });

            let subjectMap = {};
            filtered.forEach(function(session) {
                if (!subjectMap[session.subject]) {
                    subjectMap[session.subject] = { duration: 0, color: session.color };
                }
                subjectMap[session.subject].duration += session.duration;
            });

            let labels = Object.keys(subjectMap);
            let data = labels.map(name => Math.round(subjectMap[name].duration / 60));
            let colors = labels.map(name => subjectMap[name].color);

            let legend = document.getElementById('chartLegend');
            legend.innerHTML = '';
            if (labels.length === 0) {
                legend.innerHTML = '<div class="empty-message" style="padding:10px">No data for this period</div>';
            } else {
                labels.forEach(function(name, i) {
                    let item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `
                        <div class="legend-color" style="background:${colors[i]};box-shadow:0 0 8px ${colors[i]}"></div>
                        <span>${name}: ${data[i]} min</span>
                    `;
                    legend.appendChild(item);
                });
            }

            if (myChart) { myChart.destroy(); myChart = null; }
            if (labels.length === 0) return;

            let ctx = document.getElementById('studyChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderColor: colors.map(c => c + '88'),
                        borderWidth: 3,
                        hoverBorderWidth: 5,
                        hoverBorderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) { return ` ${ctx.label}: ${ctx.raw} min`; }
                            },
                            backgroundColor: 'rgba(10,10,26,0.9)',
                            borderColor: '#2a6eff',
                            borderWidth: 2,
                            titleColor: '#7aaaff',
                            bodyColor: '#aaccff',
                            padding: 12,
                            cornerRadius: 12
                        }
                    },
                    cutout: '65%',
                    animation: { animateRotate: true, duration: 800 }
                }
            });
        };

        // ========== INIT ==========
        displaySubjects();
        displaySessions();
        updateTodayTotal();
        updateChart('day');
    </script>
</body>
</html>
